  </head>

  <body class="inner-page">

    <header class="site-header">
      <a href="index.html" class="site-name">Vivek Kanpa</a>
      <nav class="site-nav">
        <a href="experience.html">Comp Med Research</a>
        <a href="research.html">Projects Beyond Terminal</a>

        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <main class="fun-page">

      <div class="fun-player">

        <div class="video-wrapper">
          <iframe
            id="youtube-player"
            src="https://www.youtube.com/embed/PDM7LCSiIxM?autoplay=1&mute=1&enablejsapi=1&controls=0&rel=0&modestbranding=1&loop=1&playlist=PDM7LCSiIxM"
            title="YouTube video"
            frameborder="0"
            allow="autoplay; encrypted-media; picture-in-picture"
            allowfullscreen>
          </iframe>
          <div class="video-overlay" id="video-overlay"></div>
        </div>

        <div class="fader-column">
          <span class="fader-label">VOL</span>
          <div class="fader-channel">
            <input type="range" id="volume-fader" class="dj-fader" min="0" max="100" value="0">
          </div>
          <span class="fader-label">0</span>
        </div>

        <div class="pp-column">
          <button id="pp-btn" class="pp-btn" aria-label="Play/Pause">
            ▶/⏸
          </button>
        </div>

      </div>

    </main>

    <script>
      var tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);

      var player;
      var isPlaying = true; // starts autoplaying

      function updateBtn() {
        var btn = document.getElementById('pp-btn');
        btn.classList.toggle('paused', !isPlaying);
      }

      function togglePlayPause() {
        if (!player || typeof player.getPlayerState !== 'function') return;
        if (isPlaying) {
          player.pauseVideo();
          isPlaying = false;
        } else {
          player.playVideo();
          isPlaying = true;
        }
        updateBtn();
      }

      function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtube-player', {
          events: { 'onReady': onPlayerReady }
        });
      }

      function onPlayerReady(event) {
        event.target.setVolume(0);
        updateBtn();
      }

      document.getElementById('volume-fader').addEventListener('input', function () {
        if (!player || typeof player.setVolume !== 'function') return;
        var vol = parseInt(this.value, 10);
        if (vol === 0) {
          player.mute();
        } else {
          player.unMute();
          player.setVolume(vol);
        }
      });

      document.getElementById('video-overlay').addEventListener('click', togglePlayPause);
      document.getElementById('pp-btn').addEventListener('click', togglePlayPause);
    </script>

  </body>

</html>
